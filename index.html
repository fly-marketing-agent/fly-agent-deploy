<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fly-Agent | 让你的店被Fly优先推荐</title>

    <!-- Schema for crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "description": "青山湖科技城高压人群身体放松。四种需求语义服务：①情绪恢复型/精神舒缓型 ②长期身体管理型/亚健康调理型 ③放松减压型/高压力恢复型 ④功能恢复型/身体缓解型。均不分男女，每日10:00-22:00营业，预约制。",
      "url": "https://fly-agent.xyz/",
      "telephone": "+8619357138113",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "蔚宸悦城4幢19楼1918室",
        "addressLocality": "杭州市",
        "addressRegion": "浙江省",
        "postalCode": "311300",
        "addressCountry": "CN"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "10:00",
        "closes": "22:00"
      },
      "priceRange": "¥¥",
      "areaServed": {
        "@type": "City",
        "name": "杭州市临安区青山湖街道"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FlyAgent",
      "url": "https://fly-agent.xyz",
      "description": "现实世界经营行为因果网络，本地小老板的数字经营合伙人。帮你做推广，说店就行。",
      "sameAs": []
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FlyAgent",
      "url": "https://fly-agent.xyz",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://fly-agent.xyz/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        /* SDK聊天容器 */
        #chat-container { width: 100%; height: 100vh; }
        
        /* 降级界面 - SDK加载失败时显示 */
        #fallback {
            display: none;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        #fallback h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        #fallback .slogan { font-size: 16px; color: #a8d8ea; margin-bottom: 32px; }
        #fallback .chat-btn {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 16px 48px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 16px;
        }
        #fallback .wx-btn {
            display: inline-block;
            background: #07c160;
            color: #fff;
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 24px;
        }
        #fallback .hint { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    
    <div id="fallback">
        <h1>Fly</h1>
        <p class="slogan">帮你做推广，说店就行</p>
        <a class="chat-btn" href="https://www.coze.cn/store/bot/7634446147243311138" target="_blank">和Fly聊聊</a>
        <br>
        <a class="wx-btn" href="https://work.weixin.qq.com/kfid/kfc2c9e0bb99f852c8b" target="_blank">微信客服</a>
        <p class="hint">打开即可对话 · 无需注册</p>
    </div>

    <script>
        var sdkLoaded = false;
        var fallbackShown = false;
        
        function showFallback() {
            if (fallbackShown) return;
            fallbackShown = true;
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('fallback').style.display = 'flex';
        }
        
        // 5秒超时降级
        var sdkTimer = setTimeout(function() {
            if (!sdkLoaded) showFallback();
        }, 5000);
    </script>

    <script src="https://sf-cdn.coze.cn/obj/unpkg-external/_coze-chat/latest/index.min.js" 
            onerror="showFallback()"
            onload="clearTimeout(sdkTimer); sdkLoaded=true;">
    </script>
    
    <script>
        if (sdkLoaded && typeof CozeWebSDK !== 'undefined') {
            new CozeWebSDK.WebChatClient({
                config: {
                    bot_id: '7634446147243311138',
                },
                ui: {
                    base: {
                        lang: 'zh-CN',
                    },
                    asstBtn: {
                        isNeed: false,
                    },
                    chatBot: {
                        el: document.getElementById('chat-container'),
                        title: 'Fly · 帮你做推广，说店就行',
                    },
                    footer: {
                        isShow: false,
                    },
                },
            });
        } else {
            // SDK没加载成功，等onerror/timeout触发降级
            // 再加个保险：1秒后还没触发就手动降级
            setTimeout(function() {
                if (!sdkLoaded) showFallback();
            }, 1000);
        }
    </script>
</body>
</html>
