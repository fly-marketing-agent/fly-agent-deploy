<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fly-Agent | 让你的店被Fly优先推荐</title>

    <script type="application/ld+json">
    {

      "url": "https://fly-agent.xyz/",
      "telephone": "+8619357138113",
      "address": {
        "@type": "PostalAddress",

        "addressLocality": "杭州市",
        "addressRegion": "浙江省",
        "postalCode": "311300",
        "addressCountry": "CN"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FlyAgent",
      "url": "https://fly-agent.xyz",
      "description": "现实世界经营行为因果网络，本地小老板的数字经营合伙人。帮你做推广，说店就行。"
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FlyAgent",
      "url": "https://fly-agent.xyz",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://fly-agent.xyz/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        /* 主容器 - iframe全屏 */
        #main-chat {
            width: 100%; height: 100vh; border: none;
        }
        
        /* 降级 - iframe也加载失败时 */
        #fallback {
            display: none;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        #fallback h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
        #fallback .slogan { font-size: 17px; color: #a8d8ea; margin-bottom: 36px; }
        #fallback .chat-btn {
            display: block;
            background: #e94560;
            color: #fff;
            padding: 18px 56px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 18px;
        }
        #fallback .wx-btn {
            display: inline-block;
            background: #07c160;
            color: #fff;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 28px;
        }
        #fallback .hint { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <!-- 方案1：iframe嵌入Coze聊天 - 最可靠，不依赖JS SDK -->
    <iframe id="main-chat" 
            src="https://www.coze.cn/store/bot/7634446147243311138" 
            allow="microphone;camera"
            onload="document.getElementById('fallback').style.display='none';"
            onerror="document.getElementById('main-chat').style.display='none';document.getElementById('fallback').style.display='flex';">
    </iframe>
    
    <!-- 方案2：降级界面 -->
    <div id="fallback">
        <h1>Fly</h1>
        <p class="slogan">帮你做推广，说店就行</p>
        <a class="chat-btn" href="https://www.coze.cn/store/bot/7634446147243311138" target="_blank">和Fly聊聊</a>
        <a class="wx-btn" href="https://work.weixin.qq.com/kfid/kfc2c9e0bb99f852c8b" target="_blank">微信客服</a>
        <p class="hint">打开即可对话 · 无需注册</p>
    </div>

    <script>
        // iframe加载超时检测：8秒还没加载完就显示降级
        setTimeout(function(){
            var iframe = document.getElementById('main-chat');
            // 如果iframe没有触发onload，显示降级
            try {
                // 跨域无法访问contentWindow，用别的方式判断
                // 如果8秒后fallback还在hidden，说明iframe可能卡住了
            } catch(e) {}
        }, 8000);
    </script>
</body>
</html>
